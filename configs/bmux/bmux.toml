# bmux configuration
#
# Keybindings mapped to match zellij config (configs/zellij/config.kdl).
# Zellij uses modal sub-modes (pane, tab, resize, move, session, tmux);
# bmux collapses these into prefix-based runtime bindings + global bindings.
#
# --- Zellij features with NO bmux equivalent (as of writing) ---
# - Alt f               : ToggleFloatingPanes (floating pane layer)
# - Alt i / Alt o       : MoveTab left/right (reorder tabs)
# - Alt p / Alt Shift p : TogglePaneInGroup / ToggleGroupMarking
# - Ctrl g              : Lock mode (pass all keys to terminal)
# - Ctrl q              : Clear screen (removed to avoid conflict with quit)
# - Ctrl f              : Session manager plugin (fuzzy session picker)
# - Ctrl+a ,            : Rename tab
# - Ctrl+a space        : NextSwapLayout (cycle pane layouts)
# - Ctrl+a Ctrl+a       : Send literal prefix key to pane
# - d / u in scroll     : HalfPageScrollDown / HalfPageScrollUp
# - e in scroll         : EditScrollback (open scrollback in $EDITOR)
# - search sub-mode     : SearchInput / SearchToggleOption (incremental search)
# ---------------------------------------------------------------

[keybindings]
prefix = "ctrl+a"

# ---------------------------------------------------------------------------
# Global bindings (no prefix required)
# Matches zellij's shared_except "locked" block
# ---------------------------------------------------------------------------
[keybindings.global]

# Tab (window) navigation -- Alt+number for direct switch
"alt+1" = "plugin:bmux.windows:goto-window 1"
"alt+2" = "plugin:bmux.windows:goto-window 2"
"alt+3" = "plugin:bmux.windows:goto-window 3"
"alt+4" = "plugin:bmux.windows:goto-window 4"
"alt+5" = "plugin:bmux.windows:goto-window 5"
"alt+6" = "plugin:bmux.windows:goto-window 6"
"alt+7" = "plugin:bmux.windows:goto-window 7"
"alt+8" = "plugin:bmux.windows:goto-window 8"
"alt+9" = "plugin:bmux.windows:goto-window 9"
"alt+0" = "plugin:bmux.windows:goto-window 10"

# Tab (window) prev/next
# Zellij: Ctrl h / Ctrl j / Ctrl Left -> GoToPreviousTab
#         Ctrl s / Ctrl Right          -> GoToNextTab
"ctrl+h"     = "plugin:bmux.windows:prev-window"
"ctrl+j"     = "plugin:bmux.windows:prev-window"
"ctrl+left"  = "plugin:bmux.windows:prev-window"
"ctrl+s"     = "plugin:bmux.windows:next-window"
"ctrl+right" = "plugin:bmux.windows:next-window"

# Toggle last window
# Zellij: Ctrl l -> ToggleTab (switch to last-used tab)
"ctrl+l" = "plugin:bmux.windows:last-window"

# Session navigation
# Zellij: Ctrl o -> enters session mode; mapped to session_prev as closest useful action
"ctrl+o" = "session_prev"

# Pane focus navigation
# Zellij: Alt h/j/k + Alt arrows -> MoveFocus / MoveFocusOrTab
"alt+h"     = "focus_left_pane"
"alt+left"  = "focus_left_pane"
"alt+j"     = "focus_down_pane"
"alt+down"  = "focus_down_pane"
"alt+k"     = "focus_up_pane"
"alt+up"    = "focus_up_pane"
"alt+right" = "focus_right_pane"

# Pane cycling
# Zellij: Ctrl k / Ctrl t -> FocusPreviousPane; Alt t -> FocusNextPane
"ctrl+k" = "focus_previous_pane"
"ctrl+t" = "focus_previous_pane"
"alt+t"  = "focus_next_pane"

# Resize
# Zellij: Alt + / Alt = -> Resize Increase; Alt - -> Resize Decrease
"alt+plus"  = "increase_split"
"alt+="     = "increase_split"
"alt+minus" = "decrease_split"

# New pane (Alt n in zellij creates a pane in default direction)
"alt+n" = "split_focused_horizontal"

# ---------------------------------------------------------------------------
# Runtime bindings (Ctrl+a prefix required)
# Matches zellij's tmux mode (Ctrl+a -> key)
# ---------------------------------------------------------------------------
[keybindings.runtime]

# Splits
# Zellij tmux: " -> split below, % -> split right
"\"" = "split_focused_horizontal"
"%"  = "split_focused_vertical"

# Toggle split direction
"t" = "toggle_split_direction"

# New window/session
# Zellij tmux: c -> NewTab, C -> new session via session-manager
"c"       = "plugin:bmux.windows:new-window"
"shift+c" = "new_session"

# Pane navigation (vim-style + arrows)
"h"     = "focus_left_pane"
"j"     = "focus_down_pane"
"k"     = "focus_up_pane"
"l"     = "focus_right_pane"
"left"  = "focus_left_pane"
"down"  = "focus_down_pane"
"up"    = "focus_up_pane"
"right" = "focus_right_pane"

# Pane cycling
# Zellij tmux: o -> FocusNextPane
"o" = "focus_next_pane"

# Tab (window) navigation
# Zellij tmux: n -> next tab, p -> previous tab
"n" = "plugin:bmux.windows:next-window"
"p" = "plugin:bmux.windows:prev-window"

# Toggle last window
# Zellij tmux: ^ -> ToggleTab; w -> last window (plugin default)
"^" = "plugin:bmux.windows:last-window"
"w" = "plugin:bmux.windows:last-window"

# Session prev/next (tmux-style parentheses)
"(" = "session_prev"
")" = "session_next"

# Close pane / close tab
# Zellij tmux: x -> CloseFocus, & -> CloseTab
"x"       = "close_focused_pane"
"shift+&" = "plugin:bmux.windows:close-current-window"

# Restart focused pane
"r" = "restart_focused_pane"

# Zoom / fullscreen toggle
# Zellij tmux: z -> ToggleFocusFullscreen
"z" = "zoom_pane"

# Resize (Shift + vim keys / Shift + arrows)
"shift+h"     = "resize_left"
"shift+l"     = "resize_right"
"shift+k"     = "resize_up"
"shift+j"     = "resize_down"
"shift+left"  = "resize_left"
"shift+right" = "resize_right"
"shift+up"    = "resize_up"
"shift+down"  = "resize_down"
"plus"        = "increase_split"
"minus"       = "decrease_split"

# Scroll / copy mode
# Zellij tmux: [ -> scroll mode, ] -> exit
"[" = "enter_scroll_mode"
"]" = "exit_scroll_mode"

# Session management
"d" = "detach"
"q" = "quit"

# Help
"?" = "show_help"

# ---------------------------------------------------------------------------
# Scroll mode bindings (active in scrollback / copy mode)
# Matches zellij's shared_among "scroll" "search" block
# ---------------------------------------------------------------------------
[keybindings.scroll]

# Exit scroll mode
"escape"   = "exit_scroll_mode"
"ctrl+c"   = "exit_scroll_mode"
"ctrl+a ]" = "exit_scroll_mode"

# Line-by-line scrolling (vim-style + arrows)
"j"    = "scroll_down_line"
"down" = "scroll_down_line"
"k"    = "scroll_up_line"
"up"   = "scroll_up_line"

# Page scrolling
# Zellij: h/left/PageUp -> PageScrollUp; l/right/PageDown -> PageScrollDown
"h"         = "scroll_up_page"
"left"      = "scroll_up_page"
"page_up"   = "scroll_up_page"
"ctrl+b"    = "scroll_up_page"
"l"         = "scroll_down_page"
"right"     = "scroll_down_page"
"page_down" = "scroll_down_page"

# Jump to top/bottom
"g"       = "scroll_top"
"shift+g" = "scroll_bottom"

# Selection / copy
"v"     = "begin_selection"
"y"     = "copy_scrollback"
"enter" = "confirm_scrollback"

# ---------------------------------------------------------------------------
# Recording defaults
# ---------------------------------------------------------------------------
[recording]
# Enable hidden rolling recording at server start.
enabled = true

# Keep the most recent 5 minutes in rolling storage.
rolling_window_secs = 300

# Manual recording defaults (also used as rolling fallbacks).
capture_input = true
capture_output = true
capture_events = true

# Rolling capture overrides: enable every capture category.
rolling_capture_input = true
rolling_capture_output = true
rolling_capture_events = true
rolling_capture_protocol_replies = true
rolling_capture_images = true

# Auto-export GIFs when user-initiated recordings stop/cut.
auto_export = true

# Write auto-exported GIFs to ~/bmux-recordings.
auto_export_dir = "~/bmux-recordings"
