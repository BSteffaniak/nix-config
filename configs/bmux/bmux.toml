# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
[plugins.settings."bmux.theme"]
# Bundled theme selected by the bmux.theme plugin. Its decoration slice
# exercises the bmux.decoration Luau scripting surface: the focused pane's
# border breathes between lime-green and cyan at 30 Hz.
theme = "pulse-demo"
persistence = "persist_between_connects"

[composition]
active_profile = "zellij_vim_local"

[composition.profiles.zellij_vim_local]
extends = ["vim", "zellij_compat"]

[composition.profiles.zellij_vim_local.patch.keybindings]
initial_mode = "normal"

[composition.profiles.zellij_vim_local.patch.keybindings.global]
"alt+1"      = "plugin:bmux.windows:goto-window 1"
"alt+2"      = "plugin:bmux.windows:goto-window 2"
"alt+3"      = "plugin:bmux.windows:goto-window 3"
"alt+4"      = "plugin:bmux.windows:goto-window 4"
"alt+5"      = "plugin:bmux.windows:goto-window 5"
"alt+6"      = "plugin:bmux.windows:goto-window 6"
"alt+7"      = "plugin:bmux.windows:goto-window 7"
"alt+8"      = "plugin:bmux.windows:goto-window 8"
"alt+9"      = "plugin:bmux.windows:goto-window 9"
"alt+0"      = "plugin:bmux.windows:goto-window 10"
"ctrl+h"     = "plugin:bmux.windows:prev-window"
"ctrl+j"     = "plugin:bmux.windows:prev-window"
"ctrl+left"  = "plugin:bmux.windows:prev-window"
"ctrl+s"     = "plugin:bmux.windows:next-window"
"ctrl+right" = "plugin:bmux.windows:next-window"
"ctrl+l"     = "plugin:bmux.windows:last-window"
"ctrl+o"     = "plugin:bmux.windows:prev-window"
"alt+left"   = "focus_left_pane"
"alt+down"   = "focus_down_pane"
"alt+up"     = "focus_up_pane"
"alt+right"  = "focus_right_pane"
"ctrl+k"     = "focus_previous_pane"
"ctrl+t"     = "focus_previous_pane"
"alt+t"      = "focus_next_pane"
"alt+plus"   = "increase_split"
"alt+="      = "increase_split"
"alt+minus"  = "decrease_split"
"ctrl+alt+r" = "plugin:bmux.prompted_actions:run recording-cut"

[composition.profiles.zellij_vim_local.patch.keybindings.modes.normal.bindings]
h = "plugin:bmux.windows:prev-window"
j = "plugin:bmux.windows:prev-window"
l = "plugin:bmux.windows:last-window"
p = "enter_mode pane"
r = "enter_mode resize"
s = "plugin:bmux.windows:next-window"
";" = "plugin:bmux.windows:next-window"

[composition.profiles.zellij_vim_local.patch.keybindings.modes.pane]
label       = "PANE"
passthrough = false

[composition.profiles.zellij_vim_local.patch.keybindings.modes.pane.bindings]
"\""        = "split_focused_horizontal"
"%"         = "split_focused_vertical"
"("         = "plugin:bmux.windows:prev-window"
")"         = "plugin:bmux.windows:next-window"
"["         = "enter_scroll_mode"
"]"         = "exit_scroll_mode"
"^"         = "plugin:bmux.windows:last-window"
c           = "plugin:bmux.windows:new-window"
h           = "focus_left_pane"
j           = "focus_down_pane"
k           = "focus_up_pane"
l           = "focus_right_pane"
left        = "focus_left_pane"
down        = "focus_down_pane"
up          = "focus_up_pane"
right       = "focus_right_pane"
n           = "plugin:bmux.windows:next-window"
o           = "focus_next_pane"
p           = "plugin:bmux.windows:prev-window"
"shift+c"  = "plugin:bmux.sessions:new-session"
"shift+r"  = "restart_focused_pane"
"shift+&"  = "plugin:bmux.windows:close-current-window"
t           = "toggle_split_direction"
w           = "plugin:bmux.windows:last-window"
x           = "close_focused_pane"
z           = "zoom_pane"
escape      = "enter_mode normal"

[composition.profiles.zellij_vim_local.patch.keybindings.modes.resize]
label       = "RESIZE"
passthrough = false

[composition.profiles.zellij_vim_local.patch.keybindings.modes.resize.bindings]
"shift+h" = "resize_left"
"shift+l" = "resize_right"
"shift+k" = "resize_up"
"shift+j" = "resize_down"
"shift+left" = "resize_left"
"shift+right" = "resize_right"
"shift+up" = "resize_up"
"shift+down" = "resize_down"
plus        = "increase_split"
minus       = "decrease_split"
escape      = "enter_mode normal"

[composition.profiles.zellij_vim_local.patch.keybindings.modes.command.bindings]
d = "detach"
q = "quit"

[composition.profiles.zellij_vim_local.patch.keybindings.scroll]
"escape" = "exit_scroll_mode"
"ctrl+c" = "exit_scroll_mode"
"j" = "scroll_down_line"
"down" = "scroll_down_line"
"k" = "scroll_up_line"
"up" = "scroll_up_line"
"h" = "scroll_up_page"
"left" = "scroll_up_page"
"page_up" = "scroll_up_page"
"ctrl+b" = "scroll_up_page"
"l" = "scroll_down_page"
"right" = "scroll_down_page"
"page_down" = "scroll_down_page"
"g" = "scroll_top"
"shift+g" = "scroll_bottom"
"v" = "begin_selection"
"y" = "copy_scrollback"
"enter" = "confirm_scrollback"

# ---------------------------------------------------------------------------
# Recording defaults
# ---------------------------------------------------------------------------
[recording]
# Enable hidden rolling recording at server start.
enabled = true

# Keep the most recent 5 minutes in rolling storage.
rolling_window_secs = 300

# Manual recording defaults (also used as rolling fallbacks).
capture_input = true
capture_output = true
capture_events = true

# Rolling capture overrides: enable every capture category.
rolling_capture_input = true
rolling_capture_output = true
rolling_capture_events = true
rolling_capture_protocol_replies = true
rolling_capture_images = true

# Auto-export GIFs when user-initiated recordings stop/cut.
auto_export = true

# Write auto-exported GIFs to ~/bmux-recordings.
auto_export_dir = "~/bmux-recordings"

# ---------------------------------------------------------------------------
# Prompted Actions plugin settings
# ---------------------------------------------------------------------------
[plugins.settings."bmux.prompted_actions"]

[[plugins.settings."bmux.prompted_actions".actions]]
name = "recording-cut"
command = "plugin:bmux.plugin_cli:recording-cut --last-seconds {seconds}"

[[plugins.settings."bmux.prompted_actions".actions.prompts]]
key = "seconds"
type = "text"
title = "Cut Recording"
placeholder = "last N seconds"
validation = "positive_integer"
